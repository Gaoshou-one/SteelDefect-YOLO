<!-- templates/index.html -->
{% extends "base.html" %}

{% block title %}检测平台 - 钢材缺陷检测系统{% endblock %}

{% block content %}
<div class="row g-4 fade-in-up">
    <!-- 左侧控制面板 -->
    <div class="col-lg-3">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-sliders2"></i> 检测控制
            </div>
            <div class="card-body">
                <!-- 输入源选择 -->
                <div class="mb-4">
                    <label class="form-label">输入源</label>
                    <div class="d-grid gap-2">
                        <button class="btn btn-outline-primary" onclick="selectImage()">
                            <i class="bi bi-folder-image"></i> 上传图片
                        </button>
                        <button class="btn btn-primary" onclick="startCamera()">
                            <i class="bi bi-camera-video"></i> 实时摄像头
                        </button>
                    </div>
                    <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="uploadImage()">
                </div>

                <!-- 检测参数设置 -->
                <div class="mb-4">
                    <label class="form-label">检测参数</label>
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="text-muted small">置信度阈值</span>
                        <span class="badge bg-primary" id="confValue">0.25</span>
                    </div>
                    <input type="range" class="form-range" id="confThreshold" min="0.1" max="0.9" step="0.05" value="0.25">
                    <div class="d-flex justify-content-between text-muted small mt-1">
                        <span>低 (0.1)</span>
                        <span>推荐 (0.25)</span>
                        <span>高 (0.9)</span>
                    </div>
                </div>

                <!-- 检测按钮 -->
                <div class="d-grid gap-2">
                    <button class="btn btn-primary" onclick="startDetection()" id="startBtn" disabled>
                        <i class="bi bi-play-fill"></i> 开始检测
                    </button>
                    <button class="btn btn-outline-danger" onclick="stopDetection()" id="stopBtn" disabled>
                        <i class="bi bi-stop-fill"></i> 停止检测
                    </button>
                </div>
            </div>
        </div>

        <!-- 检测结果卡片 -->
        <div class="card mt-4">
            <div class="card-header">
                <i class="bi bi-bar-chart"></i> 检测结果
            </div>
            <div class="card-body">
                <div class="result-stats">
                    <div class="count" id="resultCount">—</div>
                    <div class="label">检测到的缺陷数量</div>
                </div>
                <div id="resultDetails" class="detection-list">
                    <div class="text-center text-muted py-4">
                        <i class="bi bi-camera" style="font-size: 2rem;"></i>
                        <p class="mt-2 small">等待检测</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 右侧显示区域 -->
    <div class="col-lg-9">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-eye"></i> 实时预览
            </div>
            <div class="card-body p-0">
                <div class="display-container">
                    <img id="displayImage" src="" alt="检测画面" style="display: none;">
                    <div id="placeholder" class="placeholder">
                        <i class="bi bi-camera"></i>
                        <p>请上传图片或开启摄像头</p>
                        <small class="text-muted">支持 JPG、PNG、BMP 格式</small>
                    </div>
                    <canvas id="videoCanvas" style="display: none; width: 100%; height: auto;"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentImage = null;
    let videoStream = null;
    let isCameraMode = false;
    let socket = null;
    let animationId = null;
    let videoElement = null;

    const CLASS_NAME_MAP = {
        'crazing': '裂纹',
        'inclusion': '夹杂物',
        'patches': '斑块',
        'pitted_surface': '麻点',
        'rolled-in_scale': '氧化皮',
        'scratches': '划痕'
    };

    // 页面加载时初始化
    document.addEventListener('DOMContentLoaded', function() {
        // 绑定置信度阈值滑块事件
        const confSlider = document.getElementById('confThreshold');
        if (confSlider) {
            confSlider.addEventListener('input', function() {
                document.getElementById('confValue').innerText = this.value;
            });
        }

        // 初始化 WebSocket
        if (!socket) {
            console.log('初始化 WebSocket...');
            socket = io();
            socket.on('connect', function() {
                console.log('WebSocket 连接成功');
            });
            socket.on('disconnect', function() {
                console.log('WebSocket 断开连接');
            });
            socket.on('detection_result', function(data) {
                console.log('收到检测结果, 缺陷数:', data.count);
                const canvas = document.getElementById('videoCanvas');
                if (canvas && data.image) {
                    const ctx = canvas.getContext('2d');
                    const img = new Image();
                    img.onload = () => {
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        // 显示canvas，隐藏原始视频
                        if (videoElement) videoElement.style.display = 'none';
                        canvas.style.display = 'block';
                    };
                    img.src = data.image;
                }
                updateResults(data.detections, data.count);
            });
        }
    });

    function selectImage() {
        // 停止检测
        if (animationId) {
            clearTimeout(animationId);
            animationId = null;
        }
        // 关闭摄像头
        if (videoStream) {
            videoStream.getTracks().forEach(track => track.stop());
            videoStream = null;
        }
        isCameraMode = false;
        document.getElementById('imageInput').click();
    }

    function uploadImage() {
        const file = document.getElementById('imageInput').files[0];
        if (!file) return;

        showLoading('正在加载图片...');

        const reader = new FileReader();
        reader.onload = function(e) {
            currentImage = e.target.result;
            const img = document.getElementById('displayImage');
            img.src = currentImage;
            img.style.display = 'block';
            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('videoCanvas').style.display = 'none';
            // 隐藏视频元素
            if (videoElement) videoElement.style.display = 'none';
            document.getElementById('startBtn').disabled = false;
            isCameraMode = false;
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            hideLoading();
        };
        reader.readAsDataURL(file);
    }

    function startCamera() {
        console.log('开始启动摄像头...');

        // 停止检测
        if (animationId) {
            clearTimeout(animationId);
            animationId = null;
        }

        if (videoStream) {
            videoStream.getTracks().forEach(track => track.stop());
        }

        showLoading('正在启动摄像头...');

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                console.log('摄像头权限获取成功');
                videoStream = stream;

                // 创建视频元素并显示
                videoElement = document.createElement('video');
                videoElement.id = 'liveVideo';
                videoElement.srcObject = stream;
                videoElement.autoplay = true;
                videoElement.playsInline = true;
                videoElement.style.width = '100%';
                videoElement.style.height = 'auto';
                videoElement.style.display = 'block';

                // 显示视频元素
                const displayContainer = document.querySelector('.display-container');
                const placeholder = document.getElementById('placeholder');
                const displayImage = document.getElementById('displayImage');
                const videoCanvas = document.getElementById('videoCanvas');

                // 隐藏其他元素
                placeholder.style.display = 'none';
                displayImage.style.display = 'none';
                videoCanvas.style.display = 'none';

                // 移除旧的视频元素（如果存在）
                const oldVideo = document.getElementById('liveVideo');
                if (oldVideo) oldVideo.remove();

                // 添加到容器
                displayContainer.appendChild(videoElement);

                videoElement.onloadedmetadata = function() {
                    console.log('视频尺寸:', videoElement.videoWidth, 'x', videoElement.videoHeight);
                    // 设置canvas尺寸与视频相同
                    videoCanvas.width = videoElement.videoWidth;
                    videoCanvas.height = videoElement.videoHeight;
                    isCameraMode = true;
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('stopBtn').disabled = true;
                    hideLoading();
                    showSuccess('摄像头已启动，点击"开始检测"进行识别');
                };
            })
            .catch(err => {
                console.error('摄像头错误:', err.name, err.message);
                hideLoading();
                if (err.name === 'NotAllowedError') {
                    showError('请允许摄像头访问权限');
                } else if (err.name === 'NotFoundError') {
                    showError('未检测到摄像头设备');
                } else {
                    showError('无法访问摄像头: ' + err.message);
                }
            });
    }

    function startDetection() {
        if (isCameraMode) {
            startCameraDetection();
        } else if (currentImage) {
            uploadForDetection();
        } else {
            showError('请先上传图片或开启摄像头');
        }
    }

    function uploadForDetection() {
        const file = document.getElementById('imageInput').files[0];
        if (!file) return;

        showLoading('正在进行缺陷检测...');

        const formData = new FormData();
        formData.append('image', file);
        formData.append('conf_threshold', document.getElementById('confThreshold').value);

        fetch('/detect/image', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            hideLoading();
            if (data.success) {
                document.getElementById('displayImage').src = data.result_image;
                updateResults(data.detections, data.count);

                if (data.count > 0) {
                    showSuccess(`检测到 ${data.count} 个缺陷`);
                } else {
                    showInfo('未检测到缺陷');
                }
            } else {
                showError('检测失败: ' + data.error);
            }
        })
        .catch(err => {
            hideLoading();
            showError('请求失败: ' + err.message);
        });
    }

    function startCameraDetection() {
        if (!videoElement) {
            showError('摄像头未就绪');
            return;
        }

        if (!socket || !socket.connected) {
            showError('WebSocket未连接，请刷新页面重试');
            return;
        }

        // 停止之前的检测
        if (animationId) {
            clearTimeout(animationId);
            animationId = null;
        }

        function sendFrame() {
            if (!isCameraMode || !videoElement || videoElement.paused || !videoElement.videoWidth) {
                return;
            }

            try {
                const canvas = document.createElement('canvas');
                canvas.width = videoElement.videoWidth;
                canvas.height = videoElement.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                const frameData = canvas.toDataURL('image/jpeg', 0.7);

                if (socket && socket.connected) {
                    socket.emit('video_frame', {
                        image: frameData,
                        conf_threshold: document.getElementById('confThreshold').value
                    });
                }
            } catch (err) {
                console.error('发送帧错误:', err);
            }

            animationId = setTimeout(sendFrame, 100);
        }

        sendFrame();
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        console.log('开始发送视频帧');
        showInfo('检测运行中，点击停止按钮结束');
    }

    function stopDetection() {
        if (animationId) {
            clearTimeout(animationId);
            animationId = null;
        }

        // 恢复显示原始视频
        if (videoElement) {
            videoElement.style.display = 'block';
        }
        const videoCanvas = document.getElementById('videoCanvas');
        if (videoCanvas) {
            videoCanvas.style.display = 'none';
        }

        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        console.log('停止检测');
        showInfo('检测已停止');
    }

    function updateResults(detections, count) {
        const resultDiv = document.getElementById('resultCount');
        if (count > 0) {
            resultDiv.innerHTML = count;
            resultDiv.style.color = '#ef4444';
        } else {
            resultDiv.innerHTML = '0';
            resultDiv.style.color = '#10b981';
        }

        const detailsDiv = document.getElementById('resultDetails');
        if (detections && detections.length > 0) {
            let html = '';
            detections.forEach(d => {
                let defectName = d.chinese_name || CLASS_NAME_MAP[d.class_name] || d.class_name || '缺陷';
                let confidence = (d.confidence * 100).toFixed(1);
                let confidenceClass = confidence > 70 ? 'badge-high' : (confidence > 50 ? 'badge-medium' : 'badge-low');

                html += `
                    <div class="detection-item">
                        <div class="detection-name">
                            <i class="bi bi-bug"></i>
                            <span>${escapeHtml(defectName)}</span>
                        </div>
                        <span class="detection-badge ${confidenceClass}">${confidence}%</span>
                    </div>
                `;
            });
            detailsDiv.innerHTML = html;
        } else {
            detailsDiv.innerHTML = `
                <div class="text-center text-muted py-4">
                    <i class="bi bi-check-circle" style="font-size: 2rem;"></i>
                    <p class="mt-2 small">未检测到缺陷</p>
                </div>
            `;
        }
    }

    // HTML转义函数
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Toast 通知函数
    function showLoading(message) {
        Swal.fire({
            title: message,
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });
    }

    function hideLoading() {
        Swal.close();
    }

    function showSuccess(message) {
        Swal.fire({
            icon: 'success',
            title: '成功',
            text: message,
            timer: 2000,
            showConfirmButton: false
        });
    }

    function showError(message) {
        Swal.fire({
            icon: 'error',
            title: '错误',
            text: message,
            confirmButtonColor: '#6366f1'
        });
    }

    function showInfo(message) {
        Swal.fire({
            icon: 'info',
            title: '提示',
            text: message,
            timer: 1500,
            showConfirmButton: false
        });
    }

    // 页面导航函数
    function loadHistory() {
        showLoading('加载历史记录...');
        fetch('/history')
            .then(response => response.json())
            .then(data => {
                hideLoading();
                showHistoryPage(data.records);
            })
            .catch(err => {
                hideLoading();
                showError('加载失败: ' + err.message);
            });
    }

    function loadStats() {
        showLoading('加载统计数据...');
        fetch('/stats')
            .then(response => response.json())
            .then(data => {
                hideLoading();
                showStatsPage(data);
            })
            .catch(err => {
                hideLoading();
                showError('加载失败: ' + err.message);
            });
    }

    function loadUsers() {
        showInfo('用户管理功能开发中');
    }

    function showHistoryPage(records) {
        let html = `
            <div class="card fade-in-up">
                <div class="card-header">
                    <i class="bi bi-clock-history"></i> 检测历史
                </div>
                <div class="card-body p-0">
                    <div class="table-container">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>时间</th>
                                    <th>来源</th>
                                    <th>缺陷数</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
        `;

        if (records.length === 0) {
            html += '<tr><td colspan="4" class="text-center text-muted py-4">暂无检测记录</td></tr>';
        } else {
            records.forEach(r => {
                html += `
                    <tr>
                        <td><i class="bi bi-calendar3"></i> ${r.created_at}</td>
                        <td><span class="badge bg-secondary">${r.source_type}</span></td>
                        <td><span class="badge bg-danger">${r.total_detections}</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="viewDetail(${r.id})">
                                <i class="bi bi-eye"></i> 详情
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;
        document.querySelector('.main-content').innerHTML = html;
    }

    function showStatsPage(stats) {
        let html = `
            <div class="row g-4 mb-4 fade-in-up">
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="icon"><i class="bi bi-bar-chart"></i></div>
                        <div class="value">${stats.total_detections}</div>
                        <div class="label">总检测次数</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="icon"><i class="bi bi-target"></i></div>
                        <div class="value">${stats.total_objects}</div>
                        <div class="label">总检测目标</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="icon"><i class="bi bi-calendar-day"></i></div>
                        <div class="value">${stats.today_detections}</div>
                        <div class="label">今日检测</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="icon"><i class="bi bi-people"></i></div>
                        <div class="value">${stats.total_users}</div>
                        <div class="label">系统用户</div>
                    </div>
                </div>
            </div>
            <div class="card fade-in-up">
                <div class="card-header">
                    <i class="bi bi-graph-up"></i> 检测趋势
                </div>
                <div class="card-body">
                    <canvas id="trendChart" height="300"></canvas>
                </div>
            </div>
        `;
        document.querySelector('.main-content').innerHTML = html;

        const ctx = document.getElementById('trendChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: stats.trend_dates,
                datasets: [{
                    label: '检测数量',
                    data: stats.trend_counts,
                    borderColor: '#6366f1',
                    backgroundColor: 'rgba(99, 102, 241, 0.1)',
                    borderWidth: 2,
                    tension: 0.3,
                    fill: true,
                    pointBackgroundColor: '#6366f1',
                    pointBorderColor: '#fff',
                    pointRadius: 4,
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { position: 'top' }
                },
                scales: { y: { beginAtZero: true } }
            }
        });
    }

    function viewDetail(id) {
        showLoading('加载详情...');
        fetch(`/history/detail/${id}`)
            .then(response => response.json())
            .then(data => {
                hideLoading();
                Swal.fire({
                    title: '检测详情',
                    html: `
                        <div class="text-start">
                            <p><strong><i class="bi bi-calendar3"></i> 时间:</strong> ${data.record.created_at}</p>
                            <p><strong><i class="bi bi-tag"></i> 来源:</strong> ${data.record.source_type}</p>
                            <p><strong><i class="bi bi-bug"></i> 缺陷数:</strong> ${data.record.total_detections}</p>
                            <p><strong><i class="bi bi-sliders2"></i> 置信度阈值:</strong> ${data.record.confidence_threshold}</p>
                            ${data.image ? `<img src="${data.image}" class="img-fluid mt-3 rounded">` : ''}
                        </div>
                    `,
                    width: '600px',
                    confirmButtonText: '关闭',
                    confirmButtonColor: '#6366f1'
                });
            })
            .catch(err => {
                hideLoading();
                showError('加载失败: ' + err.message);
            });
    }
</script>
{% endblock %}
